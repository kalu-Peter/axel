<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories Worth Telling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #F7F4EF;
            --charcoal: #2A2A2A;
            --rust: #C85835;
            --sage: #7A8B7D;
            --gold: #D4AF37;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .grain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='3.5' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* ── Images ── */
        .image-section {
            padding: 80px 0 60px;
            opacity: 0;
            animation: fadeIn 1s ease 0.2s forwards;
        }

        /* landscape: full width, no container constraint */
        .landscape-wrap {
            width: 100%;
            opacity: 0;
            animation: slideUp 1s ease 0.4s forwards;
            margin-bottom: 50px;
        }

        .landscape-frame {
            overflow: hidden;
            width: 100%;
            max-height: 600px;
            border: 1px solid var(--sage);
            box-shadow: 0 20px 50px rgba(0,0,0,.08), 0 5px 15px rgba(0,0,0,.05);
            position: relative;
            transition: transform 0.5s cubic-bezier(.4,0,.2,1);
        }

        .landscape-frame img {
            width: 100%;
            height: 100%;
            max-height: 600px;
            object-fit: cover;
            display: block;
            filter: grayscale(0.15) contrast(1.05);
            transition: transform 0.7s cubic-bezier(.4,0,.2,1);
        }

        .landscape-wrap:hover .landscape-frame { transform: translateY(-4px); }
        .landscape-wrap:hover .landscape-frame img { transform: scale(1.03); }

        /* portrait: with contact info on left */
        .portrait-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            opacity: 0;
            animation: slideUp 1s ease 0.6s forwards;
        }

        .portrait-contact {
            text-align: right;
            flex-shrink: 0;
        }

        .portrait-contact .contact-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--charcoal);
            margin-bottom: 8px;
        }

        .portrait-contact .contact-detail {
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.95rem;
            color: var(--sage);
            line-height: 1.8;
        }

        .portrait-wrap {
            max-width: 400px;
            flex-shrink: 0;
        }

        .image-frame {
            overflow: hidden;
            aspect-ratio: 4/5;
            border: 1px solid var(--sage);
            box-shadow: 0 20px 50px rgba(0,0,0,.08), 0 5px 15px rgba(0,0,0,.05);
            transition: transform 0.5s cubic-bezier(.4,0,.2,1);
            position: relative;
        }

        .image-frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(.4,0,.2,1);
        }

        /* ── Quote ── */
        .quote-section {
            padding: 100px 0 60px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease 0.8s forwards;
        }

        .quote-mark {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            color: var(--sage);
            opacity: 0.2;
            line-height: 0.5;
            display: block;
            margin-bottom: 20px;
        }

        blockquote {
            font-family: 'Libre Baskerville', serif;
            font-size: clamp(1.5rem, 3vw, 2.25rem);
            line-height: 1.6;
            font-style: italic;
            color: var(--charcoal);
            max-width: 800px;
            margin: 0 auto;
        }

        /* ── CTA ── */
        .cta-section {
            padding: 60px 0 120px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease 1s forwards;
        }

        .cta-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .cta-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 1.2;
            margin-bottom: 30px;
            color: var(--charcoal);
        }

        .cta-content p {
            font-size: 1.25rem;
            line-height: 1.7;
            color: var(--sage);
            margin-bottom: 50px;
        }

        .youtube-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 20px 50px;
            background: var(--rust);
            color: white;
            text-decoration: none;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 10px 30px rgba(200,88,53,.3);
        }

        .youtube-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,.15);
            transform: translate(-50%,-50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .youtube-btn:hover::before { width: 300px; height: 300px; }
        .youtube-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(200,88,53,.4);
        }

        .youtube-icon { width: 28px; height: 28px; position: relative; z-index: 1; }
        .btn-text { position: relative; z-index: 1; }

        .ornament {
            width: 60px; height: 1px;
            background: var(--gold);
            margin: 30px auto;
            position: relative;
        }

        .ornament::before,
        .ornament::after {
            content: '';
            position: absolute;
            width: 8px; height: 8px;
            background: var(--gold);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
        }

        .ornament::before { left: -15px; }
        .ornament::after  { right: -15px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .images-grid { grid-template-columns: 1fr; gap: 50px; }
            .image-section { padding: 60px 0 40px; }
            .quote-section { padding: 60px 0 40px; }
            .cta-section { padding: 40px 0 80px; }
            .youtube-btn { padding: 18px 40px; font-size: 1rem; }
            .portrait-row { flex-direction: column; gap: 24px; }
            .portrait-contact { text-align: center; }
            .portrait-wrap { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <div class="container">

        <section class="image-section">
            <!-- landscape: full viewport width, breaks out of container -->
            <div style="margin: 0 -40px;">
                <div class="landscape-wrap">
                    <div class="landscape-frame">
                        <img src="image1.jpeg" alt="Story image 1">
                    </div>
                </div>
            </div>
            <!-- portrait: contact left, image right -->
            <div class="portrait-row">
                <div class="portrait-contact">
                    <div class="contact-name">Axel Susen</div>
                    <div class="contact-detail">+254 757541073</div>
                    <div class="contact-detail">axel.susen@susensoftware.de</div>
                </div>
                <div class="portrait-wrap">
                    <div class="image-frame">
                        <img src="image2.jpeg" alt="Story image 2"
                             style="width:100%;height:100%;object-fit:cover;filter:grayscale(0.15) contrast(1.05);">
                    </div>
                </div>
            </div>
        </section>

        <section class="quote-section">
            <span class="quote-mark">"</span>
            <blockquote>
                The stories we tell become the lives we live
            </blockquote>
        </section>

        <section class="cta-section">
            <div class="cta-content">
                <h2>Join the Journey</h2>
                <p>
                    Subscribe to explore stories that challenge, inspire, and illuminate
                    the world around us.
                </p>
                <a href="https://www.youtube.com/@dianimitaxel" class="youtube-btn" target="_blank" rel="noopener noreferrer">
                    <svg class="youtube-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                    <span class="btn-text">Visit Channel</span>
                </a>
                <div class="ornament"></div>
            </div>
        </section>

    </div>
</body>
</html>
